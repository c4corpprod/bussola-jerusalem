# ═══════════════════════════════════════════════════════════════
# 🕎 Bússola para Jerusalém — Deploy no Render.com
# ═══════════════════════════════════════════════════════════════
# Este arquivo configura o deploy automático no Render

services:
  - type: web
    name: bussola-jerusalem-api
    runtime: python
    region: oregon
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 2 --threads 2
    envVars:
      - key: FLASK_ENV
        value: production
      - key: FLASK_SECRET_KEY
        generateValue: true
      - key: SMTP_EMAIL
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
    autoDeploy: true
    healthCheckPath: /api/stats
